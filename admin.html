<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginBox">
<h2>Admin Access</h2>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="checkPass()">Login</button>
</div>

<div id="panel" style="display:none;">

<h2>Upload Image</h2>
<input type="file" id="imageFile">
<button onclick="uploadImage()">Upload</button>

<h2>Announcement</h2>
<input id="announceText" placeholder="Enter announcement">
<button onclick="sendAnnouncement()">Send</button>

</div>

<script>
function checkPass(){
  const p = document.getElementById("pass").value;

  if(p === "STUDYOCEAN"){
    alert("Access Granted ✅");
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
  }else{
    alert("Fuck Off ❌");
  }
}

async function uploadImage(){
  const file = document.getElementById("imageFile").files[0];
  if(!file) return alert("Select image");

  const formData = new FormData();
  formData.append("image", file);

  await fetch("/upload",{
    method:"POST",
    body:formData
  });

  alert("Uploaded ✅");
}

async function sendAnnouncement(){
  const text = document.getElementById("announceText").value;

  await fetch("/announcement",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({text})
  });

  alert("Announcement Sent ✅");
}
</script>

</body>
</html>

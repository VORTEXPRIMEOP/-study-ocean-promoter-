<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>ADMIN PANEL ⚡</h2>

<input type="text" id="title" placeholder="Post Title"><br><br>

<input type="file" id="imageUpload"><br><br>

<button onclick="uploadPost()">UPLOAD POST</button>

<br><br>
<img id="preview" width="200">

<script>

async function uploadPost(){

  const file=document.getElementById("imageUpload").files[0];
  const title=document.getElementById("title").value;

  if(!file || !title){
    alert("Fill all fields");
    return;
  }

  const formData=new FormData();
  formData.append("file",file);
  formData.append("upload_preset","vortex_upload");

  // Cloudinary Upload
  const res=await fetch(
    "https://api.cloudinary.com/v1_1/dzlu3k6f9/image/upload",
    {
      method:"POST",
      body:formData
    }
  );

  const data=await res.json();

  document.getElementById("preview").src=data.secure_url;

  // Save locally
  let posts=[];

  try{
    posts=JSON.parse(localStorage.getItem("posts"))||[];
  }catch{}

  posts.push({
    title:title,
    image:data.secure_url
  });

  localStorage.setItem("posts",JSON.stringify(posts));

  alert("Post Uploaded ✅");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  background:#06080f;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#0c111c;
  padding:40px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,234,255,.4);
}

input,button{
  padding:12px;
  margin-top:15px;
  width:100%;
  border:none;
  border-radius:8px;
}

button{
  background:linear-gradient(45deg,#00eaff,#ff2fd1);
  color:white;
  cursor:pointer;
}

#error{
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>ADMIN ACCESS</h2>

<input type="password" id="password" placeholder="Password">
<button onclick="checkPassword()">ENTER</button>

<div id="error"></div>
</div>


<div class="box" id="adminPanel" style="display:none;">
<h2>Upload Promotion</h2>

<input type="file" id="imageUpload" accept="image/*">
<button onclick="uploadImage()">UPLOAD</button>

</div>

<script>

const ADMIN_PASS="STUDYOCEAN";

function checkPassword(){
  const pass=document.getElementById("password").value;

  if(pass===ADMIN_PASS){
    alert("ACCESS GRANTED ⚡");
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
  }else{
    document.getElementById("error").innerText="FUCK OFF";
  }
}

/* ===== REAL IMAGE UPLOAD ===== */
async function uploadImage(){

  const file=document.getElementById("imageUpload").files[0];

  if(!file){
    alert("Select image first!");
    return;
  }

  const formData=new FormData();
  formData.append("image",file);

  const res=await fetch("/upload",{
    method:"POST",
    body:formData
  });

  const data=await res.json();

  if(data.success){
    alert("UPLOAD SUCCESS 🚀");
  }
}

</script>

</body>
</html>
